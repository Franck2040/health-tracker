# ------------------------------------------------------------------
# Configuration de l'application Health Tracker (profil de développement)
# ------------------------------------------------------------------

spring.application.name=health-tracker

# --- Base de données H2 en mémoire ---
spring.datasource.url=jdbc:h2:mem:healthdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 accessible sur http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
# create-drop : le schéma est recréé au démarrage et supprimé à l'arrêt.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Le jeu de données de démonstration (data.sql) est chargé après création du schéma.
spring.jpa.defer-datasource-initialization=true

# --- Thymeleaf ---
# Cache désactivé en développement pour recharger les vues instantanément.
spring.thymeleaf.cache=false

# --- Serveur ---
server.port=8080
