<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activités — Health Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="navbar">
    <span class="brand">🩺 Health Tracker</span>
    <nav>
        <a th:href="@{/dashboard}">Tableau de bord</a>
        <a th:href="@{/activities}" class="active">Activités</a>
        <a th:href="@{/measures}">Mesures</a>
        <a th:href="@{/medications}">Traitements</a>
        <a th:href="@{/users}">Utilisateurs</a>
    </nav>
</header>

<main class="container">
    <h1>Activités physiques</h1>
    <p class="subtitle">Enregistrez et suivez vos séances de sport</p>

    <section class="card">
        <h2>Nouvelle activité</h2>
        <form th:action="@{/activities}" th:object="${activity}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label for="userId">Utilisateur</label>
                    <select id="userId" name="userId" required>
                        <option value="" disabled selected>Choisir…</option>
                        <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="type">Type</label>
                    <input type="text" id="type" th:field="*{type}" placeholder="Course, Vélo…">
                    <span class="field-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></span>
                </div>
                <div class="form-group">
                    <label for="durationMinutes">Durée (min)</label>
                    <input type="number" id="durationMinutes" th:field="*{durationMinutes}" min="1">
                    <span class="field-error" th:if="${#fields.hasErrors('durationMinutes')}" th:errors="*{durationMinutes}"></span>
                </div>
                <div class="form-group">
                    <label for="caloriesBurned">Calories</label>
                    <input type="number" id="caloriesBurned" th:field="*{caloriesBurned}" min="0">
                    <span class="field-error" th:if="${#fields.hasErrors('caloriesBurned')}" th:errors="*{caloriesBurned}"></span>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" th:field="*{date}" th:max="${today}">
                    <span class="field-error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></span>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Ajouter</button>
                </div>
            </div>
        </form>
    </section>

    <section class="card">
        <h2>Historique</h2>
        <table th:if="${!activities.isEmpty()}">
            <thead>
            <tr>
                <th>Utilisateur</th>
                <th>Type</th>
                <th>Durée</th>
                <th>Calories</th>
                <th>Date</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${activities}">
                <td th:text="${a.user.fullName}">—</td>
                <td th:text="${a.type}">—</td>
                <td th:text="${a.durationMinutes} + ' min'">—</td>
                <td th:text="${a.caloriesBurned} + ' kcal'">—</td>
                <td th:text="${#temporals.format(a.date, 'dd/MM/yyyy')}">—</td>
                <td>
                    <form th:action="@{'/activities/' + ${a.id} + '/delete'}" method="post"
                          onsubmit="return confirm('Supprimer cette activité ?');">
                        <button type="submit" class="btn btn-danger">Supprimer</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <p class="empty" th:if="${activities.isEmpty()}">Aucune activité enregistrée.</p>
    </section>
</main>

<footer>Health Tracker · Suivi de santé personnel</footer>

</body>
</html>
